eureka:
  instance:
    ip-address: 127.0.0.1
    hostname: localhost
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
server:
  port: 8888

spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      routes:
        - id: REPORT-SERVICE
          uri: lb://report-service
          predicates:
            - Path=/api/v1/cvs/**












